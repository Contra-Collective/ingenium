name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: extract changelog entry
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          BODY=$(awk -v ver="${VERSION}" '
            /^## \[/ {
              if (capture) exit
              if (index($0, "[" ver "]")) capture = 1
              next
            }
            capture { print }
          ' CHANGELOG.md)
          {
            echo "body<<EOF"
            echo "${BODY:-No changelog entry found for ${VERSION}.}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: create github release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "${{ steps.changelog.outputs.body }}" \
            --prerelease
